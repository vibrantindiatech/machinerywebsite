<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shree Baneshwari Industries | Media Gallery</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<!-- Font Awesome -->
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Poppins', sans-serif;
  margin: 0;
  background: #090f20!important;
  color: #fff;
}
/* Hero */
.hero {
  background: url('https://images.unsplash.com/photo-1596495577886-d920f1fb7238?auto=format&fit=crop&w=1600&q=80') center/cover no-repeat;
  min-height: 40vh;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  position: relative;
}
.hero::after {
  content:'';
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.6);
}
.hero .container { position: relative; z-index:2; }
.hero h1 {
  font-size: 2.5rem;
  font-weight: 700;
  background: linear-gradient(90deg,#00ffcc,#00b4ff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.hero p { font-size: 1.2rem; margin: 15px 0 25px; color:#fff; }

/* Gallery Sections */
.gallery-section {
  padding: 60px 20px;
}
.gallery-section h2 {
  text-align: center;
  font-size: 2.2rem;
  font-weight: 700;
  margin-bottom: 50px;
  background: linear-gradient(90deg,#00ffcc,#00b4ff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.media-item {
  overflow: hidden;
  border-radius: 15px;
  position: relative;
  margin-bottom: 20px;
  cursor: pointer;
  transition: transform 0.4s ease, box-shadow 0.4s ease;
}
.media-item:hover {
  transform: scale(1.03);
  box-shadow: 0 10px 25px rgba(0,255,204,0.3);
}
.media-item img, .media-item video {
  width: 100%;
  height: 250px;
  object-fit: cover;
  display: block;
  transition: transform 0.5s ease;
}
.media-item:hover img { transform: scale(1.1); }
.play-btn {
  position: absolute;
  top:50%;
  left:50%;
  transform: translate(-50%, -50%);
  font-size: 3rem;
  color: rgba(255,255,255,0.8);
  pointer-events:none;
}

/* Responsive */
@media(max-width:767px){
  .media-item img, .media-item video { height:180px; }
  .hero h1{font-size:2rem;}
  .hero p{font-size:1rem;}
}
</style>
</head>
<body>
  <!-- Header Component -->
  <div id="header"></div>
<!-- Hero -->
<section class="hero">
  <div class="container">
    <h1>Our Media Gallery</h1>
    <p>Explore images and videos of our hydraulic and industrial machinery</p>
  </div>
</section>

<!-- Image Gallery Section -->
<section class="gallery-section container">
  <h2>Photo Gallery</h2>
  <div class="row g-4">
    <div class="col-md-4">
      <div class="media-item" data-bs-toggle="modal" data-bs-target="#mediaModal" data-type="image" data-src="assets/images/Hydraulic Barrel drum cutting machine manual.jpeg">
        <img src="assets/images/Hydraulic Barrel drum cutting machine manual.jpeg" alt="Drum Cutting Machine">
      </div>
    </div>
    <div class="col-md-4">
      <div class="media-item" data-bs-toggle="modal" data-bs-target="#mediaModal" data-type="image" data-src="assets/images/sample-machine-1.jpeg">
        <img src="assets/images/sample-machine-1.jpeg" alt="Machine 1">
      </div>
    </div>
    <div class="col-md-4">
      <div class="media-item" data-bs-toggle="modal" data-bs-target="#mediaModal" data-type="image" data-src="assets/images/sample-machine-2.jpeg">
        <img src="assets/images/sample-machine-2.jpeg" alt="Machine 2">
      </div>
    </div>
  </div>
</section>

<!-- Video Gallery Section -->
<section class="gallery-section container">
  <h2>Video Gallery</h2>
  <div class="row g-4">
    <div class="col-md-4">
      <div class="media-item" data-bs-toggle="modal" data-bs-target="#mediaModal" data-type="video" data-src="assets/videos/hydraulic-demo.mp4">
        <img src="assets/images/video-placeholder.jpeg" alt="Video">
        <i class="fa-solid fa-circle-play play-btn"></i>
      </div>
    </div>
    <div class="col-md-4">
      <div class="media-item" data-bs-toggle="modal" data-bs-target="#mediaModal" data-type="video" data-src="assets/videos/machine-operation.mp4">
        <img src="assets/images/video-placeholder.jpeg" alt="Video">
        <i class="fa-solid fa-circle-play play-btn"></i>
      </div>
    </div>
  </div>
</section>

<!-- Modal -->
<div class="modal fade" id="mediaModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered modal-lg">
    <div class="modal-content bg-dark border-0">
      <div class="modal-body p-0 position-relative">
        <button type="button" class="btn-close btn-close-white position-absolute top-0 end-0 m-3" data-bs-dismiss="modal" aria-label="Close"></button>
        <div id="mediaContainer" class="w-100"></div>
      </div>
    </div>
  </div>
</div>

  <!-- Footer Component -->
  <div id="footer"></div>
<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/include.js"></script>
<script>
const mediaModal = document.getElementById('mediaModal');
const mediaContainer = document.getElementById('mediaContainer');

mediaModal.addEventListener('show.bs.modal', function (event) {
  const trigger = event.relatedTarget;
  const type = trigger.getAttribute('data-type');
  const src = trigger.getAttribute('data-src');

  // Stop previous video/image
  mediaContainer.innerHTML = '';

  if(type === 'image'){
    mediaContainer.innerHTML = `<img src="${src}" class="w-100" style="border-radius:10px;">`;
  } else if(type === 'video'){
    mediaContainer.innerHTML = `<video src="${src}" controls autoplay class="w-100" style="border-radius:10px;"></video>`;
  }
});
</script>
</body>
</html>
