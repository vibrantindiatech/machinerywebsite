<!-- ✅ HEADER START (LIGHT THEME) -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shree Baneshwari Industries</title>

  <!-- Bootstrap & FontAwesome -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

  <style>
    /* === Navbar Base (Light Theme) === */
    .next-level-navbar {
      background: #ffffff; /* White background */
      border-bottom: 1px solid rgba(0,0,0,0.1);
      backdrop-filter: blur(15px);
      box-shadow: 0 4px 25px rgba(0,0,0,0.05);
      transition: all 0.4s ease;
      padding: 0.7rem 0;
      z-index: 1000;
    }

    /* === On Scroll Effect === */
    .next-level-navbar.scrolled {
      background: rgba(255,255,255,0.95);
      box-shadow: 0 8px 30px rgba(0,0,0,0.1);
      padding: 0.5rem 0;
    }

    /* === Brand === */
    .navbar-brand {
      background: linear-gradient(90deg, #007bff, #00ccff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-transform: uppercase;
      font-weight: 700;
      font-size: clamp(1.1rem, 3vw, 1.6rem);
      letter-spacing: 1px;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      white-space: nowrap;
    
    }
    .navbar-brand:hover {
      text-shadow: 0 0 10px rgba(0, 204, 255, 0.4);
      transform: scale(1.03);
    }
    .brand-text span {
      color: #333;
      font-weight: 400;
    }

    /* === Nav Links === */
    .nav-link {
      color: #111 !important; /* Dark text */
      font-size: 1.05rem;
      font-weight: 500;
      letter-spacing: 0.5px;
      position: relative;
      text-transform: capitalize;
      padding: 6px 12px;
      transition: all 0.3s ease-in-out;
    }
    .nav-link:hover {
      color: #007bff !important; /* Accent blue on hover */
    }
    .nav-link::after {
      content: "";
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 0%;
      height: 2px;
      background: linear-gradient(90deg, #007bff, #00ccff);
      transition: width 0.35s ease;
    }
    .nav-link:hover::after,
    .nav-link.active::after {
      width: 60%;
    }

    /* === Active Link === */
    .nav-link.active {
      color: #007bff !important;
      text-shadow: 0 0 6px rgba(0, 123, 255, 0.5);
    }

    /* === Quote Button === */
    .btn-glow {
      background: linear-gradient(90deg, #00ccff, #007bff);
      color: #fff;
      font-weight: 600;
      font-size: 1rem;
      border: none;
      box-shadow: 0 0 15px rgba(0,123,255,0.3);
      transition: all 0.4s ease;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .btn-glow:hover {
      transform: translateY(-3px) scale(1.05);
      box-shadow: 0 0 25px rgba(0,123,255,0.5);
    }

    /* === Responsive Styles === */
    @media (max-width: 991px) {
      .navbar-collapse {
        background: #f9f9f9;
        border-radius: 12px;
        padding: 20px 10px;
        margin-top: 10px;
        box-shadow: 0 0 15px rgba(0,0,0,0.05);
      }
      .nav-link {
        text-align: center;
        font-size: 1.05rem;
        padding: 10px 0;
      }
      .navbar-toggler {
        color: #007bff;
      }
      .navbar-toggler i {
        font-size: 1.8rem;
      }
      .btn-glow {
        width: 100%;
        margin-top: 10px;
      }
    }

    @media (max-width: 575px) {
      .navbar-brand {
        font-size: 1rem;
        flex-direction: column;
        align-items: flex-start;
        gap: 0;
        line-height: 1.3;
      }
      .navbar-toggler i {
        font-size: 1.5rem;
      }
      .nav-link {
        font-size: 0.95rem;
      }
    }
  </style>
</head>
<body>

  <!-- ✅ Navbar -->
  <nav class="navbar navbar-expand-lg next-level-navbar fixed-top">
    <div class="container-fluid px-3 px-md-4 px-lg-5">

      <!-- Brand -->
      <a class="navbar-brand fw-bold me-2" href="index.html">
        <img src="assets/logo.png" alt="" height="36" class="me-2">
        <span class="brand-text">Baneshwari <span>Industries</span></span>
      </a>

      <!-- Toggler -->
      <button
        class="navbar-toggler border-0 shadow-none"
        type="button"
        data-bs-toggle="collapse"
        data-bs-target="#mainMenu"
        aria-controls="mainMenu"
        aria-expanded="false"
        aria-label="Toggle navigation"
      >
        <i class="fa-solid fa-bars"></i>
      </button>

      <!-- Nav Links -->
      <div class="collapse navbar-collapse justify-content-lg-center mt-3 mt-lg-0" id="mainMenu">
        <ul class="navbar-nav align-items-lg-center gap-2 gap-lg-4">
          <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
          <li class="nav-item"><a class="nav-link" href="products.html">Products</a></li>
          <li class="nav-item"><a class="nav-link" href="services.html">Services</a></li>
          <li class="nav-item"><a class="nav-link" href="gallery.html">Gallery</a></li>
          <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
        </ul>

        <!-- Mobile Button -->
        <div class="d-lg-none text-center mt-3">
          <a href="quote.html" class="btn btn-glow py-2 fw-semibold rounded-pill">
            Get Quote <i class="fa-solid fa-arrow-right ms-2"></i>
          </a>
        </div>
      </div>

      <!-- Desktop Button -->
      <div class="d-none d-lg-block ms-auto">
        <a href="quote.html" class="btn btn-glow px-4 py-2 fw-semibold rounded-pill">
          Get Quote <i class="fa-solid fa-arrow-right ms-2"></i>
        </a>
      </div>
    </div>
  </nav>

  <!-- === Script === -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    // Navbar scroll effect
    window.addEventListener("scroll", function () {
      const nav = document.querySelector(".next-level-navbar");
      nav.classList.toggle("scrolled", window.scrollY > 40);
    });

    // Active link highlight
    document.addEventListener("DOMContentLoaded", () => {
      const current = window.location.pathname.split("/").pop();
      document.querySelectorAll(".nav-link").forEach((link) => {
        const href = link.getAttribute("href");
        if (href.includes(current) && current !== "")
          link.classList.add("active");
        else if (current === "" && href.includes("index.html"))
          link.classList.add("active");
      });
    });
  </script>
</body>
</html>
<!-- ✅ HEADER END (LIGHT THEME) -->
