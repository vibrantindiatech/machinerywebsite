<!-- ✅ STYLE -->
<style>
/* === Base Navbar === */
.next-level-navbar {
  background: linear-gradient(120deg, #06142f, #0a1931, #1b262c);
  border-bottom: 1px solid rgba(255, 255, 255, 0.08);
  backdrop-filter: blur(25px);
  box-shadow: 0 4px 25px rgba(0, 255, 204, 0.1);
  transition: all 0.4s ease;
  padding: 0.8rem 0;
  z-index: 1000;
}

/* === Scroll Shadow === */
.next-level-navbar.scrolled {
  background: rgba(6, 20, 47, 0.95);
  box-shadow: 0 8px 30px rgba(0, 255, 204, 0.15);
}

/* === Brand === */
.navbar-brand {
  background: linear-gradient(90deg, #00e0ff, #00ff99);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  text-transform: uppercase;
  letter-spacing: 1px;
  transition: all 0.3s ease;
  white-space: nowrap;
}
.navbar-brand:hover {
  text-shadow: 0 0 15px rgba(0, 255, 204, 0.7);
  transform: scale(1.03);
}
.brand-text span {
  color: rgba(255, 255, 255, 0.75);
  font-weight: 400;
}

/* === Nav Links === */
.nav-link {
  color: #e8e8e8 !important;
  font-size: 1.05rem;
  font-weight: 500;
  letter-spacing: 0.5px;
  position: relative;
  text-transform: capitalize;
  padding: 6px 12px;
  transition: all 0.3s ease-in-out;
}
.nav-link:hover {
  color: #00ffcc !important;
}
.nav-link::after {
  content: "";
  position: absolute;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 0%;
  height: 2px;
  background: linear-gradient(90deg, #00e0ff, #00ff99);
  transition: width 0.35s ease;
}
.nav-link:hover::after,
.nav-link.active::after {
  width: 60%;
}

/* === Active Link === */
.nav-link.active {
  color: #00ffcc !important;
  text-shadow: 0 0 10px rgba(0, 255, 204, 0.6);
}

/* === Button === */
.btn-glow {
  background: linear-gradient(90deg, #00ffcc, #00b4ff);
  color: #0b132b;
  font-weight: 600;
  font-size: 1rem;
  border: none;
  box-shadow: 0 0 20px rgba(0, 255, 204, 0.4);
  transition: all 0.4s ease;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.btn-glow:hover {
  transform: translateY(-3px) scale(1.05);
  box-shadow: 0 0 30px rgba(0, 255, 204, 0.6);
}

/* === Responsive === */
@media (max-width: 991px) {
  .navbar-collapse {
    background: rgba(10, 20, 45, 0.98);
    border-radius: 14px;
    padding: 20px;
    margin-top: 10px;
  }
  .nav-link {
    text-align: center;
    font-size: 1.1rem;
    padding: 10px 0;
  }
  .navbar-toggler {
    color: #00ffcc;
  }
  .navbar-toggler i {
    font-size: 1.8rem;
  }
}
@media (max-width: 575px) {
  .navbar-brand {
    font-size: 1.1rem;
    white-space: normal;
    text-align: left;
  }
  .nav-link {
    font-size: 1rem;
  }
  .btn-glow {
    font-size: 0.9rem;
  }
}
</style>

<!-- ✅ SCRIPT -->
<script>
  // Add shadow on scroll
  window.addEventListener("scroll", function () {
    const nav = document.querySelector(".next-level-navbar");
    nav.classList.toggle("scrolled", window.scrollY > 40);
  });

  // Highlight active link
  document.addEventListener("DOMContentLoaded", () => {
    const current = window.location.pathname.split("/").pop();
    document.querySelectorAll(".nav-link").forEach((link) => {
      const href = link.getAttribute("href");
      if (href.includes(current) && current !== "")
        link.classList.add("active");
      else if (current === "" && href.includes("index.html"))
        link.classList.add("active");
    });
  });
</script>
