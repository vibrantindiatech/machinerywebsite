<!-- Floating Contact & Scroll Buttons -->
<div class="floating-buttons">
  <a href="https://wa.me/919876543210" class="float-btn whatsapp" aria-label="Chat on WhatsApp">
    <i class="bi bi-whatsapp"></i>
  </a>
  <a href="tel:+919876543210" class="float-btn call" aria-label="Call Now">
    <i class="bi bi-telephone-fill"></i>
  </a>
  <button id="scrollTopBtn" class="float-btn top" aria-label="Scroll to Top">
    <i class="bi bi-arrow-up-short"></i>
  </button>
</div>

<style>
/* ==== Floating Buttons ==== */
.floating-buttons {
  position: fixed;
  bottom: 25px;
  right: 25px;
  display: flex;
  flex-direction: column;
  gap: 16px;
  align-items: center;
  z-index: 1100;
}

/* Base */
.float-btn {
  width: 58px;
  height: 58px;
  border-radius: 50%;
  display: flex;
  justify-content: center;
  align-items: center;
  color: #fff;
  font-size: 26px;
  border: none;
  box-shadow: 0 6px 18px rgba(0, 0, 0, 0.25);
  backdrop-filter: blur(12px);
  transition: all 0.35s ease;
  text-decoration: none;
  cursor: pointer;
}

/* Colors */
.whatsapp { background: linear-gradient(135deg, #25D366, #128C7E); }
.call { background: linear-gradient(135deg, #007bff, #0056d2); }
.top { background: linear-gradient(135deg, #ff7b00, #ff4b2b); display: none; }

/* Hover Effects */
.float-btn:hover {
  transform: scale(1.12) translateY(-4px);
  box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
}

/* Responsive */
@media (max-width: 576px) {
  .floating-buttons {
    bottom: 15px;
    right: 15px;
    gap: 12px;
  }
  .float-btn {
    width: 48px;
    height: 48px;
    font-size: 22px;
  }
}
</style>

<script>
const scrollTopBtn = document.querySelector("#scrollTopBtn");
window.addEventListener("scroll", () => {
  scrollTopBtn.style.display = window.scrollY > 400 ? "flex" : "none";
});
scrollTopBtn.addEventListener("click", () => {
  window.scrollTo({ top: 0, behavior: "smooth" });
});
</script>
